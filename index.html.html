<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RRA Produções - Gestão Financeira</title>
    <link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%2338bdf8'/><text x='50%' y='53%' dominant-baseline='middle' text-anchor='middle' font-family='sans-serif' font-size='38' font-weight='900' fill='%23000'>RRA</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root { --sidebar-bg: #000000; --accent: #38bdf8; --main-bg: #f8fafc; --card-bg: #ffffff; --primary: #000000; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--main-bg); display: flex; min-height: 100vh; }

        /* MENU LATERAL FIXO */
        .sidebar { width: 260px; background: var(--sidebar-bg); color: white; position: fixed; height: 100vh; z-index: 1000; padding: 2rem 1.5rem; transition: transform 0.3s ease; }
        .logo { font-weight: 900; font-size: 1.5rem; margin-bottom: 3rem; color: white; }
        .logo span { color: var(--accent); }
        .nav-item { padding: 14px; cursor: pointer; color: #94a3b8; font-weight: 500; border-radius: 8px; margin-bottom: 8px; }
        .nav-item:hover, .nav-item.active { background: #1f2937; color: var(--accent); }

        /* HEADER MOBILE (APARECE SÓ NO CELULAR) */
        .mobile-header { display: none; padding: 1rem; background: #000; color: white; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 999; }

        /* RESPONSIVIDADE */
        @media (max-width: 900px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.active { transform: translateX(0); }
            .mobile-header { display: flex; }
            .main-content { margin-left: 0 !important; padding: 1.5rem !important; }
        }

        .main-content { margin-left: 260px; flex: 1; padding: 3rem; }
        .section { display: none; }
        .section.active { display: block; }
        .card { background: white; padding: 1.5rem; border-radius: 12px; margin-bottom: 1.5rem; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

    <div class="mobile-header">
        <div class="logo">RRA<span>PRODUÇÕES</span></div>
        <button onclick="toggleMenu()" style="background:none; border:none; color:white; font-size:1.5rem;"><i class="fa-solid fa-bars"></i></button>
    </div>

    <div class="sidebar" id="sidebar">
        <div class="logo">RRA<span>PRODUÇÕES</span></div>
        <div class="nav-item active" onclick="showSection('dashboard')"><i class="fa-solid fa-chart-pie"></i> Painel Inicial</div>
        <div class="nav-item" onclick="showSection('cadastro-acao')"><i class="fa-solid fa-plus-circle"></i> Cadastrar Ação</div>
        <div class="nav-item" onclick="showSection('recebimentos')"><i class="fa-solid fa-hand-holding-dollar"></i> Recebimentos</div>
        <div class="nav-item" onclick="showSection('pagamentos')"><i class="fa-solid fa-wallet"></i> Contas a Pagar</div>
        <div class="nav-item" onclick="showSection('relatorios')"><i class="fa-solid fa-file-invoice"></i> Relatórios</div>
    </div>

    <div class="main-content">
        </div>

    <script>
        function toggleMenu() { document.getElementById('sidebar').classList.toggle('active'); }
        function showSection(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(window.innerWidth < 900) toggleMenu(); // Fecha o menu ao clicar
        }
        // [COLE AQUI TODO O SEU SCRIPT JAVASCRIPT]
    </script>
</body>
</html>
